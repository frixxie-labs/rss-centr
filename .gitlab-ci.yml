stages:
  - build
  - test
  - deploy

build-backend:
  stage: build
  image: "rust:latest"

  script:
    - rustc --version && cargo --version
    - cd backend && cargo build --workspace --verbose
  variables:
    SQLX_OFFLINE: 1

build-frontend:
  stage: build
  image: "denoland/deno:latest"

  script:
    - deno --version
    - cd frontend && deno task install && deno task build

test-backend:
  stage: test
  image: "rust:latest"

  services:
    - postgres:latest
  script:
    - rustc --version && cargo --version
    - cd backend && cargo test --workspace --verbose
  variables:
    SQLX_OFFLINE: 1
    POSTGRES_DB: postgres
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: admin
    POSTGRES_HOST_AUTH_METHOD: trust
    DATABASE_URL: postgresql://postgres:admin@postgres:5432/postgres

test-frontend:
  stage: test
  image: "denoland/deno:latest"

  script:
    - deno --version
    - cd frontend && deno install
    - cd frontend && deno task check
    - cd frontend && deno test .

deploy-backend:
  stage: deploy
  tags:
    - docker-build
  image:
    name: quay.io/buildah/stable:latest
    entrypoint: [""]
  variables:
    BUILDAH_ISOLATION: chroot
    BUILDAH_FORMAT: docker
  script:
    - buildah login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" "${CI_REGISTRY}"
    - buildah build
      --file backend/Dockerfile
      --tag "${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG}"
    - buildah push "${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG}"
  rules:
    - if: $CI_COMMIT_TAG

deploy-frontend:
  stage: deploy
  tags:
    - docker-build
  image:
    name: quay.io/buildah/stable:latest
    entrypoint: [""]
  variables:
    BUILDAH_ISOLATION: chroot
    BUILDAH_FORMAT: docker
  script:
    - buildah login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" "${CI_REGISTRY}"
    - buildah build
      --file frontend/Dockerfile
      --tag "${CI_REGISTRY_IMAGE}:frontend-${CI_COMMIT_TAG}"
      frontend
    - buildah push "${CI_REGISTRY_IMAGE}:frontend-${CI_COMMIT_TAG}"
  rules:
    - if: $CI_COMMIT_TAG
