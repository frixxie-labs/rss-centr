stages:
  - build
  - test
  - deploy

build-backend:
  stage: build
  image: "rust:latest"
  script:
    - rustc --version && cargo --version
    - cargo build --workspace --verbose
  variables:
    SQLX_OFFLINE: 1

build-frontend:
  stage: build
  image: "denoland/deno:latest"
  before_script:
    - cd frontend

  script:
    - deno --version
    - deno install
    - deno task build

test-backend:
  stage: test
  image: "rust:latest"
  services:
    - name: "postgres:latest"
      alias: postgres
  before_script:
    - apt-get update && apt-get install -y postgresql-client
    - until pg_isready -h postgres -p 5432 -U postgres; do sleep 1; done
  script:
    - rustc --version && cargo --version
    - cargo test --workspace --verbose
  variables:
    POSTGRES_DB: "rss_centr"
    POSTGRES_USER: "postgres"
    POSTGRES_PASSWORD: "postgres"
    DATABASE_URL: "postgres://postgres:postgres@postgres:5432/rss_centr"
    SQLX_OFFLINE: 1

test-frontend:
  stage: test
  image: "denoland/deno:latest"
  before_script:
    - cd frontend

  script:
    - deno --version
    - deno install
    - deno task check
    - deno test -A

deploy-backend:
  stage: deploy
  tags:
    - docker-build
  image:
    name: quay.io/buildah/stable:latest
    entrypoint: [""]
  variables:
    BUILDAH_ISOLATION: chroot
    BUILDAH_FORMAT: docker
  script:
    - buildah login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" "${CI_REGISTRY}"
    - buildah build
      --file backend/Dockerfile
      --tag "${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG}"
      .
    - buildah push "${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG}"
  rules:
    - if: $CI_COMMIT_TAG

deploy-frontend:
  stage: deploy
  tags:
    - docker-build
  image:
    name: quay.io/buildah/stable:latest
    entrypoint: [""]
  variables:
    BUILDAH_ISOLATION: chroot
    BUILDAH_FORMAT: docker
  before_script:
    - cd frontend
  script:
    - buildah login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" "${CI_REGISTRY}"
    - buildah build
      --file Dockerfile
      --tag "${CI_REGISTRY_IMAGE}:frontend-${CI_COMMIT_TAG}"
    - buildah push "${CI_REGISTRY_IMAGE}:frontend-${CI_COMMIT_TAG}"
  rules:
    - if: $CI_COMMIT_TAG

deploy-worker:
  stage: deploy
  tags:
    - docker-build
  image:
    name: quay.io/buildah/stable:latest
    entrypoint: [""]
  variables:
    BUILDAH_ISOLATION: chroot
    BUILDAH_FORMAT: docker
  script:
    - buildah login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" "${CI_REGISTRY}"
    - buildah build
      --file worker/Dockerfile
      --tag "${CI_REGISTRY_IMAGE}:worker-${CI_COMMIT_TAG}"
      .
    - buildah push "${CI_REGISTRY_IMAGE}:worker-${CI_COMMIT_TAG}"
  rules:
    - if: $CI_COMMIT_TAG
