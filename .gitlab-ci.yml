stages:
  - build
  - test
  - deploy

build-backend:
  stage: build
  image: "rust:latest"
  before_script:
    - cd backend
  script:
    - rustc --version && cargo --version
    - cargo build --verbose
  variables:
    SQLX_OFFLINE: 1

build-frontend:
  stage: build
  image: "denoland/deno:latest"
  before_script:
    - cd frontend

  script:
    - deno --version
    - deno install
    - deno task build

test-backend:
  stage: test
  image: "rust:latest"
  before_script:
    - cd backend
  script:
    - rustc --version && cargo --version
    - cargo test --verbose
  variables:
    SQLX_OFFLINE: 1
    DATABASE_URL: "sqlite::memory:"

test-frontend:
  stage: test
  image: "denoland/deno:latest"
  before_script:
    - cd frontend

  script:
    - deno --version
    - deno install
    - deno task check
    - deno test -A

deploy-backend:
  stage: deploy
  tags:
    - docker-build
  image:
    name: quay.io/buildah/stable:latest
    entrypoint: [""]
  variables:
    BUILDAH_ISOLATION: chroot
    BUILDAH_FORMAT: docker
  before_script:
    - cd frontend
  script:
    - buildah login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" "${CI_REGISTRY}"
    - buildah build
      --file Dockerfile
      --tag "${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG}"
    - buildah push "${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG}"
  rules:
    - if: $CI_COMMIT_TAG

deploy-frontend:
  stage: deploy
  tags:
    - docker-build
  image:
    name: quay.io/buildah/stable:latest
    entrypoint: [""]
  variables:
    BUILDAH_ISOLATION: chroot
    BUILDAH_FORMAT: docker
  before_script:
    - cd frontend
  script:
    - buildah login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" "${CI_REGISTRY}"
    - buildah build
      --file Dockerfile
      --tag "${CI_REGISTRY_IMAGE}:frontend-${CI_COMMIT_TAG}"
      frontend
    - buildah push "${CI_REGISTRY_IMAGE}:frontend-${CI_COMMIT_TAG}"
  rules:
    - if: $CI_COMMIT_TAG
