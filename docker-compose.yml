services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: sqlite:dev.db
    volumes:
      - ./backend/dev.db:/app/dev.db

  frontend:
    build: ./frontend
    ports:
      - "8000:8000"
    environment:
      BACKEND_URL: http://backend:8080
    depends_on:
      - backend
